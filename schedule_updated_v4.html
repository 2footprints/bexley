<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성연회계법인</title>
<style>
:root{
  --bg:#f2f4f6;
  --bg2:#e8ebed;
  --card:#ffffff;
  --blue:#3182f6;
  --blue-light:#ebf3fe;
  --blue-dark:#1b64da;
  --navy:#191f28;
  --navy2:#2d3540;
  --text:#191f28;
  --text2:#4e5968;
  --text3:#8b95a1;
  --border:#e5e8eb;
  --border2:#d1d6db;
  --red:#f04452;
  --red-bg:#fff2f2;
  --green:#00c471;
  --green-bg:#edfaf4;
  --orange:#ff6b00;
  --orange-bg:#fff4ec;
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* Header */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100}
.header-logo{font-size:17px;font-weight:800;color:var(--navy);letter-spacing:-.3px}
.header-logo span{color:var(--blue)}
.header-nav{display:flex;gap:4px;margin-left:8px}
.nav-btn{padding:7px 14px;font-size:13px;font-weight:500;border:none;border-radius:8px;cursor:pointer;font-family:inherit;background:transparent;color:var(--text2);transition:all .15s}
.nav-btn:hover{background:var(--bg);color:var(--text)}
.nav-btn.active{background:var(--blue-light);color:var(--blue);font-weight:700}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.user-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg);border-radius:20px;font-size:12px;color:var(--text2)}
.admin-chip{background:var(--blue-light);color:var(--blue);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.logout-btn{padding:6px 12px;font-size:12px;border:1px solid var(--border2);background:transparent;color:var(--text3);border-radius:8px;cursor:pointer;font-family:inherit}
.logout-btn:hover{border-color:var(--blue);color:var(--blue)}
.notif-dot{width:6px;height:6px;background:var(--red);border-radius:50%;display:inline-block;margin-left:3px;vertical-align:middle}

/* App */
.app{padding:24px;max-width:1200px;margin:0 auto}
.btn{padding:8px 16px;font-size:13px;font-weight:600;border:1px solid var(--border2);background:var(--card);color:var(--text);border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:-.2px}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{background:var(--blue-dark)}
.btn.danger{color:var(--red);border-color:#fcc}
.btn.danger:hover{background:var(--red-bg)}
.btn.ghost{border-color:transparent;color:var(--text3)}
.btn.ghost:hover{background:var(--bg);color:var(--text2)}
.btn.sm{padding:5px 12px;font-size:12px}
select{padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-family:inherit;cursor:pointer;font-weight:500}
.status-bar{font-size:12px;color:var(--text3);padding:0 0 16px;min-height:28px}
.status-bar.ok{color:var(--green)}
.status-bar.err{color:var(--red)}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px}
.card-sm{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:16px}

/* Alert */
.alert-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.alert-card{border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:opacity .15s}
.alert-card:hover{opacity:.85}
.alert-card.red{background:var(--red-bg);border:1px solid #fcc}
.alert-card.orange{background:var(--orange-bg);border:1px solid #ffd4a8}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.alert-body{flex:1}
.alert-title{font-size:12px;font-weight:700;margin-bottom:4px}
.alert-title.red{color:var(--red)}
.alert-title.orange{color:var(--orange)}
.alert-items{display:flex;flex-wrap:wrap;gap:4px}
.alert-tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.alert-tag.red{background:#ffe0e3;color:var(--red)}
.alert-tag.orange{background:#ffe4cc;color:var(--orange)}

/* Pinned */
.pinned-card{background:var(--navy);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s}
.pinned-card:hover{background:var(--navy2)}
.pinned-card-text{flex:1;min-width:0}
.pinned-card-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px}
.pinned-card-preview{font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pinned-card-date{font-size:11px;color:rgba(255,255,255,.3);flex-shrink:0}

/* Board */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-title{font-size:18px;font-weight:800;color:var(--navy);letter-spacing:-.3px}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.board-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.client-card{background:var(--card);border-radius:var(--radius);padding:20px;cursor:pointer;border:1px solid var(--border);transition:all .2s;position:relative}
.client-card:hover{border-color:var(--blue);box-shadow:var(--shadow);transform:translateY(-2px)}
.client-card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.client-avatar{width:44px;height:44px;border-radius:12px;background:var(--navy);color:#fff;font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:center;letter-spacing:-.5px}
.client-warn{background:var(--red-bg);color:var(--red);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.client-name{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:3px;letter-spacing:-.3px}
.client-industry{font-size:12px;color:var(--text3);margin-bottom:12px}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;min-height:22px}
.chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;color:#fff}
.client-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}
.client-members{font-size:11px;color:var(--text3)}
.client-active{font-size:12px;color:var(--blue);font-weight:700}
.empty-state{text-align:center;padding:64px 20px;color:var(--text3);grid-column:1/-1}
.empty-icon{font-size:44px;margin-bottom:12px;display:block;opacity:.25}

/* Detail */
.detail-back{display:inline-flex;align-items:center;gap:6px;margin-bottom:20px;cursor:pointer;color:var(--text3);font-size:13px;font-weight:500;padding:6px 0}
.detail-back:hover{color:var(--blue)}
.detail-hero{background:var(--navy);border-radius:var(--radius);padding:24px;margin-bottom:16px;display:flex;align-items:flex-start;gap:20px}
.detail-avatar{width:60px;height:60px;border-radius:16px;background:var(--blue);color:#fff;font-size:26px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.detail-hero-text h2{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:4px}
.detail-hero-text p{font-size:13px;color:rgba(255,255,255,.4)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.section-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.3px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bg)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:12px;color:var(--text3)}
.info-value{font-size:12px;color:var(--text);font-weight:500;text-align:right}
.memo-area{background:var(--bg);border-radius:var(--radius-sm);padding:12px;font-size:12px;color:var(--text2);line-height:1.7;white-space:pre-wrap;min-height:60px}
.proj-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bg);cursor:pointer;border-radius:var(--radius-sm);transition:background .1s}
.proj-item:hover{background:var(--bg);padding-left:8px;padding-right:8px;margin:0 -8px}
.proj-item:last-child{border-bottom:none}
.proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:13px;font-weight:700;color:var(--navy);letter-spacing:-.2px}
.proj-sub{font-size:11px;color:var(--text3);margin-top:2px}
.proj-warn{font-size:11px;color:var(--red);font-weight:600;margin-top:2px}
.proj-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}

/* Badges */
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-green{background:var(--green-bg);color:#00a65a}
.badge-gray{background:var(--bg);color:var(--text3)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-orange{background:var(--orange-bg);color:var(--orange)}

/* Gantt */
.gantt-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.month-nav{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px}
.month-label{font-size:14px;font-weight:800;min-width:90px;text-align:center;color:var(--navy);letter-spacing:-.3px}
.month-nav-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:16px;color:var(--text3);flex-shrink:0}
.month-nav-btn:hover{background:var(--bg);color:var(--text)}
.gantt-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
table{border-collapse:collapse;min-width:100%}
.th-label{position:sticky;left:0;z-index:3;background:#f8f9fa;font-size:11px;font-weight:700;color:var(--text3);padding:10px 14px;white-space:nowrap;border-bottom:1px solid var(--border);border-right:1px solid var(--border2);min-width:140px;letter-spacing:.2px;text-transform:uppercase}
.th-day{font-size:10px;color:var(--text3);padding:6px 2px;text-align:center;min-width:28px;border-bottom:1px solid var(--border);font-weight:500}
.th-day.weekend{background:#fafafa;color:var(--blue)}
.th-day.today-h{background:var(--blue);color:#fff;font-weight:800}
.sec-row td{background:#f8f9fa;font-size:11px;font-weight:700;color:var(--text3);padding:5px 14px;border-top:1px solid var(--border);letter-spacing:.2px;text-transform:uppercase}
.row-label{position:sticky;left:0;z-index:2;background:var(--card);font-size:12px;color:var(--text);padding:6px 14px;white-space:nowrap;border-right:1px solid var(--border2);vertical-align:middle;cursor:pointer}
.row-label:hover{background:var(--bg)}
.row-label .rn{font-weight:700;color:var(--navy);letter-spacing:-.2px}
.row-label .rs{font-size:11px;color:var(--text3);margin-top:2px}
.row-label.row-warn{background:#fffbf0}
.row-label.row-conflict{background:#fff5f5}
.cell{min-width:28px;height:34px;padding:0;position:relative;border-right:1px solid #f0f2f4}
.cell.weekend{background:#fafafa}
.cell.today-c{background:rgba(49,130,246,.06)}
.bar{position:absolute;top:5px;bottom:5px;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;cursor:pointer;z-index:1;letter-spacing:-.2px}
.bar:hover{filter:brightness(.92)}
.bar.conflict{outline:2px solid var(--red);outline-offset:1px}
.g-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:3px}
.g-badge.conflict{background:rgba(240,68,82,.15);color:var(--red)}
.g-badge.overdue{background:rgba(255,107,0,.15);color:var(--orange)}
.g-badge.mine{background:rgba(49,130,246,.15);color:var(--blue)}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:12px 0 2px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);font-weight:500}
.legend-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}

/* Dash */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.stat-label{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:10px}
.stat-num{font-size:32px;font-weight:800;color:var(--navy);letter-spacing:-1px;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:6px}
.stat-card.warn .stat-num{color:var(--red)}
.stat-card.ok .stat-num{color:var(--green)}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.load-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.load-name{font-size:13px;color:var(--text);width:72px;flex-shrink:0;font-weight:600}
.load-bar-wrap{flex:1;background:var(--bg);border-radius:20px;height:6px;overflow:hidden}
.load-bar{height:100%;border-radius:20px;background:var(--blue);transition:width .4s}
.load-bar.overload{background:var(--red)}
.load-count{font-size:12px;color:var(--text3);width:28px;text-align:right;font-weight:700}
.load-count.overload{color:var(--red)}

/* Notice */
.notice-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all .15s;margin-bottom:10px}
.notice-card:hover{border-color:var(--blue);box-shadow:var(--shadow)}
.notice-card.pinned{border-left:3px solid var(--blue)}
.notice-chip-row{display:flex;gap:6px;margin-bottom:8px}
.notice-title{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:6px;letter-spacing:-.3px}
.notice-meta{font-size:11px;color:var(--text3);margin-bottom:6px}
.notice-preview{font-size:12px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.6}
.notice-empty{text-align:center;padding:48px 20px;color:var(--text3);background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
.notice-detail-title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:8px;letter-spacing:-.5px}
.notice-detail-meta{font-size:12px;color:var(--text3);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.notice-detail-body{font-size:14px;color:var(--text2);line-height:1.8;white-space:pre-wrap}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(25,31,40,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:20px;padding:28px;width:480px;max-width:100%;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:22px;letter-spacing:-.3px}
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:-.1px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:11px 14px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);font-family:inherit;transition:border .15s;font-weight:500}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,130,246,.1)}
.form-half{display:flex;gap:10px}
.form-half .form-row{flex:1}
.member-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.member-tag{display:flex;align-items:center;gap:5px;background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:700;padding:5px 10px;border-radius:20px}
.member-tag button{background:none;border:none;cursor:pointer;color:var(--blue);font-size:14px;line-height:1;padding:0;opacity:.6}
.member-tag button:hover{opacity:1}
.modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.modal-footer-right{display:flex;gap:8px}
.conflict-warn{background:var(--red-bg);color:var(--red);font-size:12px;padding:10px 14px;border-radius:var(--radius-sm);margin-top:10px;font-weight:500}
.readonly-notice{background:var(--bg);color:var(--text3);font-size:12px;padding:10px 14px;border-radius:var(--radius-sm);margin-top:10px}
.divider{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.3px;text-transform:uppercase;margin:18px 0 12px;display:flex;align-items:center;gap:8px}
.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.checkbox-row{display:flex;align-items:center;gap:8px;padding:8px 0}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.checkbox-row label{font-size:13px;color:var(--text);cursor:pointer;font-weight:500}


.helper-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-top:12px}
.helper-title{font-size:12px;font-weight:800;color:var(--navy);margin-bottom:8px}
.helper-text{font-size:12px;color:var(--text2);line-height:1.7}
.copy-area{width:100%;min-height:220px;padding:12px 14px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text2);font-family:inherit;line-height:1.7;resize:vertical}
.muted{font-size:11px;color:var(--text3)}
/* Popup */
.popup-bg{position:fixed;inset:0;background:rgba(25,31,40,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.popup-box{background:var(--card);border-radius:20px;padding:32px;width:400px;max-width:100%;text-align:center}
.popup-tag{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:6px;display:inline-block;margin-bottom:16px}
.popup-title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:10px;letter-spacing:-.5px}
.popup-body{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:24px;text-align:left;white-space:pre-wrap;background:var(--bg);padding:14px;border-radius:var(--radius-sm)}

/* Login */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-box{background:var(--card);border-radius:20px;padding:40px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo-mark{width:52px;height:52px;background:var(--blue);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin:0 auto 14px}
.login-logo h1{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-.5px}
.login-logo p{font-size:13px;color:var(--text3);margin-top:4px}
.login-tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:24px}
.login-tab{flex:1;padding:9px;font-size:13px;font-weight:600;border:none;border-radius:8px;cursor:pointer;font-family:inherit;background:transparent;color:var(--text3);transition:all .15s}
.login-tab.active{background:var(--card);color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.login-input-wrap{margin-bottom:14px}
.login-input-wrap label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px}
.login-input-wrap input{width:100%;padding:12px 14px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;color:var(--text);background:#fff;transition:border .15s}
.login-input-wrap input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,130,246,.1)}
.login-submit{width:100%;padding:14px;font-size:14px;font-weight:800;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;letter-spacing:-.2px;transition:background .15s;margin-top:4px}
.login-submit:hover{background:var(--blue-dark)}
.login-submit:disabled{background:var(--text3);cursor:not-allowed}
.login-msg{font-size:12px;text-align:center;margin-top:10px;min-height:18px;font-weight:500}
.login-msg.err{color:var(--red)}
.login-msg.ok{color:var(--green)}
</style>
</head>
<body>

<!-- 로그인 -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-mark">S</div>
      <h1>성연회계법인</h1>
      <p>업무 관리 시스템</p>
    </div>
    <div class="login-tabs">
      <button class="login-tab active" id="tabLogin" onclick="switchTab('login')">로그인</button>
      <button class="login-tab" id="tabSignup" onclick="switchTab('signup')">회원가입</button>
    </div>
    <div class="login-input-wrap"><label>이메일</label><input type="email" id="authEmail" placeholder="@bexleyintl.com" onkeydown="if(event.key==='Enter')document.getElementById('authPw').focus()"/></div>
    <div class="login-input-wrap"><label>비밀번호</label><input type="password" id="authPw" placeholder="비밀번호 (6자 이상)" onkeydown="if(event.key==='Enter')doAuth()"/></div>
    <button class="login-submit" id="authBtn" onclick="doAuth()">로그인</button>
    <div class="login-msg" id="authMsg"></div>
  </div>
</div>

<!-- 메인 -->
<div id="mainApp" style="display:none">
  <div class="header">
    <div class="header-logo">성연<span>.</span></div>
    <nav class="header-nav">
      <button class="nav-btn active" id="navClients" onclick="setPage('clients')">고객사</button>
      <button class="nav-btn" id="navGantt" onclick="setPage('gantt')">스케줄</button>
      <button class="nav-btn" id="navDash" onclick="setPage('dash')">대시보드</button>
      <button class="nav-btn" id="navNotice" onclick="setPage('notice')">공지<span id="noticeDot" class="notif-dot" style="display:none"></span></button>
    </nav>
    <div class="header-right">
      <span id="adminChip" class="admin-chip" style="display:none">관리자</span>
      <div class="user-chip"><span id="userDisplay">-</span></div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="app">
    <div class="status-bar" id="statusBar"></div>

    <!-- 고객사 -->
    <div id="pageClients" style="display:none">
      <div id="alertWrap" class="alert-wrap"></div>
      <div id="pinnedWrap"></div>
      <div class="section-header">
        <h2 class="section-title" id="boardTitle">고객사</h2>
        <div class="filter-row">
          <select id="myFilter" onchange="renderClients()"><option value="me">내 고객사</option><option value="">전체</option></select>
          <select id="billingFilter" onchange="renderClients()"><option value="">빌링 전체</option><option value="미청구">미청구</option><option value="청구완료">청구완료</option><option value="수금완료">수금완료</option></select>
          <button class="btn sm" id="memberMgrBtn" style="display:none" onclick="openMemberManager()">인력 관리</button>
          <button class="btn primary sm" onclick="openClientModal()">+ 고객사</button>
        </div>
      </div>
      <div class="board-grid" id="clientGrid"></div>
    </div>

    <!-- 상세 -->
    <div id="pageDetail" style="display:none">
      <div class="detail-back" onclick="setPage('clients')">← 고객사 목록</div>
      <div id="detailContent"></div>
    </div>

    <!-- 스케줄 -->
    <div id="pageGantt" style="display:none">
      <div class="gantt-toolbar">
        <div class="month-nav">
          <button class="month-nav-btn" id="prevM">‹</button>
          <span class="month-label" id="monthLabel"></span>
          <button class="month-nav-btn" id="nextM">›</button>
        </div>
        <button class="btn sm" id="gvp" onclick="setGView('project')">프로젝트별</button>
        <button class="btn sm" id="gvm" onclick="setGView('member')">인력별</button>
        <button class="btn sm" onclick="goToday()">오늘</button>
        <select id="memberFilter" style="font-size:12px"><option value="me">내 프로젝트</option><option value="">전체</option></select>
        <button class="btn primary sm" onclick="openProjModal()" style="margin-left:auto">+ 프로젝트</button>
      </div>
      <div class="gantt-wrap" id="ganttWrap"></div>
      <div class="legend" id="legend"></div>
    </div>

    <!-- 대시보드 -->
    <div id="pageDash" style="display:none"></div>

    <!-- 공지 -->
    <div id="pageNotice" style="display:none">
      <div class="section-header">
        <h2 class="section-title">공지사항</h2>
        <button class="btn primary sm" id="noticeWriteBtn" style="display:none" onclick="openNoticeWrite()">+ 공지 작성</button>
      </div>
      <div id="noticeList"></div>
    </div>
  </div>
</div>

<div id="popupArea"></div>
<div id="modalArea"></div>

<script>
const SB_URL='https://ueysvpndnpejcnyonecq.supabase.co';
const SB_KEY='sb_publishable_cLopHWFkUpZ5LN5thjd3eQ_UpLHh8Pe';
let accessToken=null,refreshToken=null,currentUser=null,isAdmin=false,currentMember=null;
let projects=[],members=[],clients=[],notices=[];
let noticeReadIds=new Set();
let curPage='clients',curGView='project';
const NOW=new Date();
let curYear=NOW.getFullYear(),curMonth=NOW.getMonth()+1;
let editingProjId=null,formMembers=[],editingClientId=null;

const TYPES={'감사':'#191f28','세무':'#1b64da','밸류에이션':'#f04452','자문':'#6b4fbb','실사':'#00a65a','휴가':'#8b95a1','기타':'#4e5968'};
const ST_OP={'진행중':1,'예정':.5,'완료':.3};

// ── Auth ──
function saveSession(s){accessToken=s.access_token;refreshToken=s.refresh_token;currentUser=s.user;localStorage.setItem('sb_a',accessToken);localStorage.setItem('sb_r',refreshToken);}
function clearSession(){accessToken=null;refreshToken=null;currentUser=null;isAdmin=false;currentMember=null;['sb_a','sb_r'].forEach(k=>localStorage.removeItem(k));}
async function restoreSession(){
  const at=localStorage.getItem('sb_a'),rt=localStorage.getItem('sb_r');
  if(!at||!rt)return false;
  try{const r=await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},body:JSON.stringify({refresh_token:rt})});if(!r.ok)throw 0;const d=await r.json();saveSession(d);return true;}
  catch(e){clearSession();return false;}
}
async function signIn(e,p){const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.error_description||'로그인 실패');saveSession(d);}
async function signUp(e,p){const r=await fetch(SB_URL+'/auth/v1/signup',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.msg||'가입 실패');return d;}
async function doLogout(){if(accessToken)await fetch(SB_URL+'/auth/v1/logout',{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+accessToken}}).catch(()=>{});clearSession();showPage('login');}

let authMode='login';
function switchTab(m){
  authMode=m;
  document.getElementById('tabLogin').classList.toggle('active',m==='login');
  document.getElementById('tabSignup').classList.toggle('active',m==='signup');
  document.getElementById('authBtn').textContent=m==='login'?'로그인':'회원가입';
  document.getElementById('authMsg').textContent='';
}
async function doAuth(){
  const email=document.getElementById('authEmail').value.trim(),pw=document.getElementById('authPw').value;
  const msg=document.getElementById('authMsg'),btn=document.getElementById('authBtn');
  if(!email||!pw){setMsg(msg,'이메일과 비밀번호를 입력해주세요.','err');return;}
  if(!email.endsWith('@bexleyintl.com')){setMsg(msg,'회사 이메일만 사용 가능합니다.','err');return;}
  if(pw.length<6){setMsg(msg,'비밀번호는 6자 이상이어야 합니다.','err');return;}
  btn.disabled=true;btn.textContent=authMode==='login'?'로그인 중...':'가입 중...';
  try{
    if(authMode==='login'){await signIn(email,pw);await initApp();}
    else{await signUp(email,pw);setMsg(msg,'가입 완료! 인증 메일을 확인해주세요.','ok');switchTab('login');}
  }catch(e){const em={'Invalid login credentials':'이메일 또는 비밀번호가 올바르지 않습니다.','Email not confirmed':'이메일 인증이 필요합니다.'};setMsg(msg,em[e.message]||e.message,'err');}
  finally{btn.disabled=false;btn.textContent=authMode==='login'?'로그인':'회원가입';}
}
function setMsg(el,txt,type){el.textContent=txt;el.className='login-msg'+(type?' '+type:'');}
function showPage(p){document.getElementById('loginPage').style.display=p==='login'?'flex':'none';document.getElementById('mainApp').style.display=p==='main'?'block':'none';}

async function initApp(){
  showPage('main');
  try{
    const[roles,mm]=await Promise.all([api('GET','user_roles?id=eq.'+currentUser.id+'&select=is_admin'),api('GET','members?email=eq.'+encodeURIComponent(currentUser.email)+'&select=*')]);
    isAdmin=roles&&roles[0]?.is_admin||false;currentMember=mm&&mm[0]||null;
  }catch(e){}
  document.getElementById('adminChip').style.display=isAdmin?'inline-block':'none';
  document.getElementById('memberMgrBtn').style.display=isAdmin?'inline-block':'none';
  document.getElementById('noticeWriteBtn').style.display=isAdmin?'inline-block':'none';
  document.getElementById('userDisplay').textContent=currentMember?currentMember.name:currentUser.email;
  await loadAll();
  checkPopup();
  setPage('clients');
}

// ── API ──
async function api(method,path,body){
  const headers={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(accessToken||SB_KEY)};
  if(body)headers['Prefer']='return=representation';
  const r=await fetch(SB_URL+'/rest/v1/'+path,{method,headers,body:body?JSON.stringify(body):undefined});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=await r.text();return t?JSON.parse(t):null;
}

async function loadAll(){
  setStatus('불러오는 중...');
  try{
    const readPath=currentUser?.id
      ? 'notice_reads?user_id=eq.'+encodeURIComponent(currentUser.id)+'&select=notice_id'
      : null;
    const [projs,mems,pm,cls,nts,reads]=await Promise.all([
      api('GET','projects?select=*&order=start_date'),
      api('GET','members?select=*&order=name'),
      api('GET','project_members?select=project_id,member_id,members(name)'),
      api('GET','clients?select=*&order=name'),
      api('GET','notices?select=*&order=is_pinned.desc,created_at.desc'),
      readPath ? api('GET',readPath).catch(()=>[]) : Promise.resolve([])
    ]);
    members=mems||[];
    projects=(projs||[]).map(p=>({...p,start:p.start_date,end:p.end_date,members:(pm||[]).filter(x=>x.project_id===p.id).map(x=>x.members?.name).filter(Boolean)}));
    clients=cls||[];notices=nts||[];
    noticeReadIds=new Set((reads||[]).map(r=>r.notice_id));
    populateMemberFilter();
    setStatus('✓ '+clients.length+'개 고객사 · '+projects.length+'개 프로젝트','ok');
    updateNoticeDot();
  }catch(e){setStatus('오류: '+e.message,'err');}
}

function setStatus(msg,type=''){
  const el=document.getElementById('statusBar');if(!el)return;
  el.textContent=msg;el.className='status-bar'+(type?' '+type:'');
  if(type==='ok')setTimeout(()=>{el.textContent='';el.className='status-bar';},3000);
}

function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function noticeReadKey(id){return 'notice_read_'+(currentUser?.id||'guest')+'_'+id;}
function isNoticeRead(id){return noticeReadIds.has(id)||localStorage.getItem(noticeReadKey(id))==='1';}
async function markNoticeRead(id){
  try{
    if(currentUser?.id){
      await api('POST','notice_reads',{notice_id:id,user_id:currentUser.id});
      noticeReadIds.add(id);
    }
  }catch(e){
    console.warn('notice_reads insert failed',e);
  }
  localStorage.setItem(noticeReadKey(id),'1');
  noticeReadIds.add(id);
}
function getUnreadRequiredNotices(){return notices.filter(n=>n.require_confirm&&!isNoticeRead(n.id));}
function billingDraftKey(id){return 'billing_draft_'+(currentUser?.id||'guest')+'_'+id;}
function getBillingDraft(id){try{return JSON.parse(localStorage.getItem(billingDraftKey(id))||'{}');}catch(e){return {};}}
function saveBillingDraft(id,data){localStorage.setItem(billingDraftKey(id),JSON.stringify(data||{}));}
async function copyText(text){
  try{await navigator.clipboard.writeText(text);alert('메일 문안을 복사했습니다.');}
  catch(e){const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('메일 문안을 복사했습니다.');}
}
function inferBillingMonth(project){const base=project?.end||project?.start||new Date().toISOString().slice(0,10);const d=toDate(base);return d.getFullYear()+'년 '+String(d.getMonth()+1).padStart(2,'0')+'월';}
function buildBillingEmail(project, client, helper){
  const owner=helper.billing_owner||project?.billing_owner||currentMember?.name||currentUser?.email||'';
  const amount=helper.billing_amount||project?.billing_amount||'';
  const month=helper.billing_month||project?.billing_month||inferBillingMonth(project);
  const taxContact=helper.tax_invoice_contact||project?.tax_invoice_contact||[client?.contact_name, client?.contact_email].filter(Boolean).join(' / ');
  const filePath=helper.file_path||project?.file_path||'';
  const note=helper.extra_note||project?.billing_note||'';
  return `[세금계산서 발행 요청] ${client?.name||'고객사명'} / ${project?.name||'프로젝트명'} / ${month}

안녕하세요.

아래 건 세금계산서 발행 요청드립니다.

1. 기본 정보
- 고객사: ${client?.name||''}
- 프로젝트명: ${project?.name||''}
- 담당자: ${owner}
- 공급가액: ${amount?Number(amount).toLocaleString()+'원':''}
- 발행 기준월: ${month}
- 세금계산서 담당자: ${taxContact}

2. 파일 정리 위치
- ${filePath||'파일 경로 입력 필요'}

3. 저장 필요 자료
- 계약서 또는 발주서
- 금액 산정 근거 파일
- 세금계산서 발행 관련 메일
- 발행 완료 자료

4. 비고
- ${note||'-'}

발행 완료 후 시스템 내 빌링 상태를 업데이트 부탁드립니다.

감사합니다.`;
}

// ── Alerts ──
function getAlerts(){
  const today=new Date();today.setHours(0,0,0,0);
  const overdue=[],unbilled=[];
  projects.forEach(p=>{
    if(toDate(p.end)<today&&p.status!=='완료')overdue.push(p.name);
    if(p.status==='완료'&&p.is_billable&&p.billing_status==='미청구')unbilled.push(p.name);
  });
  return{overdue,unbilled};
}

function renderAlerts(){
  const{overdue,unbilled}=getAlerts();
  const el=document.getElementById('alertWrap');
  let html='';
  if(overdue.length)html+='<div class="alert-card red" onclick="setPage(\'gantt\')">'
    +'<div class="alert-icon">⏰</div><div class="alert-body">'
    +'<div class="alert-title red">기간 초과 — 완료 처리 필요 ('+overdue.length+'건)</div>'
    +'<div class="alert-items">'+overdue.slice(0,5).map(n=>'<span class="alert-tag red">'+n+'</span>').join('')+'</div>'
    +'</div></div>';
  if(unbilled.length)html+='<div class="alert-card orange" onclick="setPage(\'dash\')">'
    +'<div class="alert-icon">💰</div><div class="alert-body">'
    +'<div class="alert-title orange">완료됐으나 빌링 미처리 ('+unbilled.length+'건)</div>'
    +'<div class="alert-items">'+unbilled.slice(0,5).map(n=>'<span class="alert-tag orange">'+n+'</span>').join('')+'</div>'
    +'</div></div>';
  el.innerHTML=html;
}

function updateNoticeDot(){document.getElementById('noticeDot').style.display=getUnreadRequiredNotices().length?'inline-block':'none';}

function checkPopup(){
  const unread=getUnreadRequiredNotices();
  const n=unread[0];if(!n){document.getElementById('popupArea').innerHTML='';return;}
  document.getElementById('popupArea').innerHTML=
    '<div class="popup-bg"><div class="popup-box">'
    +'<div class="popup-tag">📌 필독 공지</div>'
    +'<div class="popup-title">'+esc(n.title)+'</div>'
    +'<div class="popup-body">'+esc(n.content)+'</div>'
    +'<button class="btn primary" style="width:100%;padding:12px;font-size:14px;font-weight:800" data-id="'+n.id+'" onclick="acknowledgeNotice(this.dataset.id)">확인했습니다</button>'
    +'</div></div>';
}
async function acknowledgeNotice(id){
  await markNoticeRead(id);
  document.getElementById('popupArea').innerHTML='';
  updateNoticeDot();
  checkPopup();
}

// ── Pages ──
function setPage(page){
  curPage=page;
  ['pageClients','pageDetail','pageGantt','pageDash','pageNotice'].forEach(id=>document.getElementById(id).style.display='none');
  ['navClients','navGantt','navDash','navNotice'].forEach(id=>document.getElementById(id).classList.remove('active'));
  const pages={clients:'pageClients',detail:'pageDetail',gantt:'pageGantt',dash:'pageDash',notice:'pageNotice'};
  const navs={clients:'navClients',detail:'navClients',gantt:'navGantt',dash:'navDash',notice:'navNotice'};
  document.getElementById(pages[page]).style.display='block';
  document.getElementById(navs[page]).classList.add('active');
  if(page==='clients'){renderAlerts();renderClients();}
  else if(page==='gantt')renderGantt();
  else if(page==='dash')renderDash();
  else if(page==='notice')renderNotices();
}

// ── Clients ──
function renderClients(){
  const myOnly=document.getElementById('myFilter').value==='me';
  const bf=document.getElementById('billingFilter').value;
  const pinned=notices.find(n=>n.is_pinned);
  document.getElementById('pinnedWrap').innerHTML=pinned
    ?'<div class="pinned-card" onclick="openNoticeDetail(this.dataset.id)" data-id="'+pinned.id+'">'
      +'<span style="color:var(--blue);font-size:16px">📌</span>'
      +'<div class="pinned-card-text"><div class="pinned-card-title">'+esc(pinned.title)+'</div>'
      +'<div class="pinned-card-preview">'+esc(pinned.content.substring(0,80))+'</div></div>'
      +'<div class="pinned-card-date">'+formatDate(pinned.created_at)+'</div>'
      +'</div>':'';
  let filtered=clients.filter(c=>{
    if(myOnly&&currentMember&&!projects.filter(p=>p.client_id===c.id).some(p=>p.members.includes(currentMember.name)))return false;
    if(bf&&!projects.filter(p=>p.client_id===c.id).some(p=>p.billing_status===bf))return false;
    return true;
  });
  const grid=document.getElementById('clientGrid');
  if(!filtered.length){grid.innerHTML='<div class="empty-state"><span class="empty-icon">🏢</span>고객사가 없습니다<br><br><button class="btn primary sm" onclick="openClientModal()">+ 고객사 추가</button></div>';return;}
  const today=new Date();
  grid.innerHTML=filtered.map(c=>{
    const cp=projects.filter(p=>p.client_id===c.id);
    const active=cp.filter(p=>p.status==='진행중');
    const mems=[...new Set(cp.flatMap(p=>p.members))];
    const chips=cp.slice(0,3).map(p=>'<span class="chip" style="background:'+TYPES[p.type]+'">'+p.type+'</span>').join('');
    const warns=cp.filter(p=>(toDate(p.end)<today&&p.status!=='완료')||(p.status==='완료'&&p.is_billable&&p.billing_status==='미청구')).length;
    return '<div class="client-card" onclick="openClientDetail(this.dataset.id)" data-id="'+c.id+'">'
      +'<div class="client-card-head"><div class="client-avatar">'+c.name.charAt(0)+'</div>'
      +(warns?'<span class="client-warn">⚠ '+warns+'</span>':'')+'</div>'
      +'<div class="client-name">'+c.name+'</div>'
      +'<div class="client-industry">'+(c.industry||'업종 미입력')+'</div>'
      +'<div class="chip-row">'+chips+(cp.length>3?'<span style="font-size:11px;color:var(--text3);padding:3px 0">외 '+(cp.length-3)+'건</span>':'')+'</div>'
      +'<div class="client-footer"><span class="client-members">'+mems.slice(0,3).join(' · ')+'</span><span class="client-active">'+active.length+'건 진행중</span></div>'
      +'</div>';
  }).join('');
}

function openClientDetail(id){
  const c=clients.find(x=>x.id===id);if(!c)return;
  const cp=projects.filter(p=>p.client_id===id);
  const mems=[...new Set(cp.flatMap(p=>p.members))];
  const today=new Date();
  const projItems=cp.map(p=>{
    const od=toDate(p.end)<today&&p.status!=='완료';
    const ub=p.status==='완료'&&p.is_billable&&p.billing_status==='미청구';

async function saveClient(){

// ── Gantt ──
function pad(n){return String(n).padStart(2,'0');}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}
function toDate(s){if(!s)return new Date(0);const[y,mo,d]=s.split('-').map(Number);return new Date(y,mo-1,d);}
function isWeekend(y,m,d){const w=new Date(y,m-1,d).getDay();return w===0||w===6;}
function isToday(y,m,d){const t=new Date();return t.getFullYear()===y&&t.getMonth()+1===m&&t.getDate()===d;}
function hasConflict(p){if(p.type==='휴가')return false;return projects.some(o=>{if(o.id===p.id||o.type==='휴가')return false;if(!p.members.some(m=>o.members.includes(m)))return false;return toDate(p.start)<=toDate(o.end)&&toDate(p.end)>=toDate(o.start);});}
function getConflicts(mems,s,e,xid){return projects.filter(o=>{if(o.id===xid||o.type==='휴가')return false;if(!mems.some(m=>o.members.includes(m)))return false;return toDate(s)<=toDate(o.end)&&toDate(e)>=toDate(o.start);}).map(o=>o.name);}
function canEdit(p){return isAdmin||(currentUser&&p.created_by===currentUser.id);}
function isOverdue(p){return toDate(p.end)<new Date()&&p.status!=='완료';}
function goToday(){curYear=NOW.getFullYear();curMonth=NOW.getMonth()+1;renderGantt();}

function setGView(v){
  curGView=v;
  ['gvp','gvm'].forEach(id=>{document.getElementById(id).style.cssText='';});
  document.getElementById(v==='project'?'gvp':'gvm').style.cssText='background:var(--navy);color:#fff;border-color:var(--navy)';
  renderGantt();
}

function populateMemberFilter(){
  const sel=document.getElementById('memberFilter');const prev=sel.value;
  sel.innerHTML='<option value="me">내 프로젝트</option><option value="">전체</option>';
  members.forEach(m=>{const o=document.createElement('option');o.value=m.name;o.textContent=m.name;sel.appendChild(o);});
  if(prev&&prev!=='me'&&prev!=='')sel.value=prev;
}

function renderGantt(){
  document.getElementById('monthLabel').textContent=curYear+'년 '+curMonth+'월';
  const days=daysInMonth(curYear,curMonth);
  const mf=document.getElementById('memberFilter').value;
  const mFirst=new Date(curYear,curMonth-1,1),mLast=new Date(curYear,curMonth-1,days);
  let projs=projects.filter(p=>{
    if(mf==='me'&&currentMember&&!p.members.includes(currentMember.name))return false;
    if(mf&&mf!=='me'&&!p.members.includes(mf))return false;
    return toDate(p.start)<=mLast&&toDate(p.end)>=mFirst;
  });
  if(!projs.length){document.getElementById('ganttWrap').innerHTML='<div class="empty-state" style="padding:40px">이 달에 프로젝트가 없습니다.</div>';renderLegend();return;}
  let html='<table><thead><tr><th class="th-label">'+(curGView==='project'?'프로젝트':'인력')+'</th>';
  for(let d=1;d<=days;d++){const wk=isWeekend(curYear,curMonth,d),td=isToday(curYear,curMonth,d);const wd=['일','월','화','수','목','금','토'][new Date(curYear,curMonth-1,d).getDay()];html+='<th class="th-day '+(td?'today-h':wk?'weekend':'')+'">'+d+'<br><span style="font-size:9px;font-weight:400">'+wd+'</span></th>';}
  html+='</tr></thead><tbody>';
  if(curGView==='project'){
    const bt={};projs.forEach(p=>{(bt[p.type]=bt[p.type]||[]).push(p);});
    Object.entries(bt).forEach(([type,ps])=>{html+='<tr class="sec-row"><td colspan="'+(days+1)+'">'+type+' · '+ps.length+'건</td></tr>';ps.forEach(p=>{html+=gRow(p,days);});});
  }else{
    const mems=mf==='me'?[currentMember?.name].filter(Boolean):mf?[mf]:members.map(m=>m.name);
    mems.forEach(name=>{const mp=projs.filter(p=>p.members.includes(name));if(!mp.length)return;html+='<tr class="sec-row"><td colspan="'+(days+1)+'">'+name+' · '+mp.length+'건</td></tr>';mp.forEach(p=>{html+=gRow(p,days);});});
  }
  html+='</tbody></table>';
  document.getElementById('ganttWrap').innerHTML=html;
  renderLegend();requestAnimationFrame(fixBars);
}

function gRow(p,days){
  const conf=hasConflict(p),od=isOverdue(p),mine=currentUser&&p.created_by===currentUser.id&&!isAdmin;
  const color=TYPES[p.type]||'#4e5968';const opacity=ST_OP[p.status]||1;
  const pS=toDate(p.start),pE=toDate(p.end);
  const mFirst=new Date(curYear,curMonth-1,1),mLast=new Date(curYear,curMonth-1,days);
  const barS=pS<mFirst?1:pS.getDate();const barE=pE>mLast?days:pE.getDate();const span=barE-barS+1;
  const badges=(conf?'<span class="g-badge conflict">⚡충돌</span>':'')+(od?'<span class="g-badge overdue">⏰초과</span>':'')+(mine?'<span class="g-badge mine">내 것</span>':'');
  const client=clients.find(c=>c.id===p.client_id);
  const rowCls='row-label'+(conf?' row-conflict':od?' row-warn':'');
  const lbl='<div class="rn">'+p.name+badges+'</div><div class="rs">'+(p.members.join(', ')||'미배정')+(client?' · '+client.name:'')+'</div>';
  let cells='';
  for(let d=1;d<=days;d++){
    const wk=isWeekend(curYear,curMonth,d),td=isToday(curYear,curMonth,d);
    const cls='cell '+(wk?'weekend ':'')+( td?'today-c':'');
    if(d===barS){cells+='<td class="'+cls+'" style="position:relative"><div class="bar'+(conf?' conflict':'')+'" style="left:2px;right:0;background:'+color+';color:#fff;opacity:'+opacity+'" data-span="'+span+'" data-pid="'+p.id+'" onclick="openProjModal(this.dataset.pid)" title="'+p.name+'">'+(span>=5?p.name:'')+'</div></td>';}
    else{cells+='<td class="'+cls+'"></td>';}
  }
  return '<tr><td class="'+rowCls+'" onclick="openProjModal(\''+p.id+'\')">'+lbl+'</td>'+cells+'</tr>';
}

function fixBars(){
  document.querySelectorAll('.bar[data-span]').forEach(bar=>{
    const span=parseInt(bar.dataset.span);const td=bar.closest('td');if(!td)return;
    let w=0,t=td;for(let i=0;i<span;i++){if(t){w+=t.offsetWidth;t=t.nextElementSibling;}}
    bar.style.width=(w-4)+'px';bar.style.right='auto';
  });
}

function renderLegend(){
  document.getElementById('legend').innerHTML=Object.entries(TYPES).map(([k,c])=>'<div class="legend-item"><div class="legend-dot" style="background:'+c+'"></div>'+k+'</div>').join('')+'<div class="legend-item" style="margin-left:12px;gap:8px"><span style="opacity:.3">■</span> 완료 <span style="opacity:.5">■</span> 예정 <span>■</span> 진행중</div>';
}

  const start=document.getElementById('fStart').value;
  const end=document.getElementById('fEnd').value;
  const status=document.getElementById('fStatus').value;
  const client_id=document.getElementById('fClient').value||null;
  const is_billable=document.getElementById('fBillable').checked;
  const billing_status=is_billable?document.getElementById('fBilling').value:'미청구';
  const billing_amount=is_billable&&document.getElementById('fAmt').value?parseInt(document.getElementById('fAmt').value):null;
  const billing_owner=is_billable?document.getElementById('fBOwner').value.trim()||null:null;
  const billing_month=is_billable?document.getElementById('fBMonth').value.trim()||null:null;
  const tax_invoice_contact=is_billable?document.getElementById('fBTax').value.trim()||null:null;
  const file_path=is_billable?document.getElementById('fBPath').value.trim()||null:null;
  const billing_note=is_billable?document.getElementById('fBNote').value.trim()||null:null;
  const memo=document.getElementById('fMemo').value.trim()||null;
  if(!name||!start||!end){alert('프로젝트명, 시작일, 종료일을 입력해주세요.');return;}
  if(start>end){alert('종료일이 시작일보다 빠릅니다.');return;}
  try{
    if(editingProjId){
      await api('PATCH','projects?id=eq.'+editingProjId,{name,type,start_date:start,end_date:end,status,client_id,is_billable,billing_status,billing_amount,billing_owner,billing_month,tax_invoice_contact,file_path,billing_note,memo});
      await api('DELETE','project_members?project_id=eq.'+editingProjId);
    }else{
      const res=await api('POST','projects',{name,type,start_date:start,end_date:end,status,client_id,is_billable,billing_status,billing_amount,billing_owner,billing_month,tax_invoice_contact,file_path,billing_note,memo,created_by:currentUser.id});
      editingProjId=res[0].id;
    }
    for(const mn of formMembers){const mem=members.find(m=>m.name===mn);if(mem)await api('POST','project_members',{project_id:editingProjId,member_id:mem.id});}
    closeModal();await loadAll();
    if(curPage==='gantt')renderGantt();
    else if(curPage==='detail'){const cid=clients.find(c=>projects.find(p=>p.id===editingProjId)?.client_id===c.id)?.id;if(cid)openClientDetail(cid);else setPage('clients');}
    else renderClients();
  }catch(e){alert('저장 오류: '+e.message);}
}

async function deleteProj(){
  if(!confirm('프로젝트를 삭제할까요?'))return;
  try{await api('DELETE','projects?id=eq.'+editingProjId);closeModal();await loadAll();if(curPage==='gantt')renderGantt();else renderClients();}
  catch(e){alert('오류: '+e.message);}
}

function openBillingMailModal(pid){
  const targetId=pid||editingProjId;
  const project=projects.find(x=>x.id===targetId);
  if(!project){alert('먼저 프로젝트를 저장한 뒤 사용해주세요.');return;}
  const client=clients.find(c=>c.id===project.client_id)||{};
  const draft=getBillingDraft(targetId);
  const owner=draft.billing_owner||project.billing_owner||currentMember?.name||currentUser?.email||'';
  const billingMonth=draft.billing_month||project.billing_month||inferBillingMonth(project);
  const taxContact=draft.tax_invoice_contact||project.tax_invoice_contact||[client.contact_name,client.contact_email].filter(Boolean).join(' / ');
  const filePath=draft.file_path||project.file_path||'';
  const extraNote=draft.extra_note||project.billing_note||'';
  const amount=draft.billing_amount||project.billing_amount||'';
  document.getElementById('modalArea').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal" style="width:620px"><div class="modal-title">빌링 요청 메일 문안</div>'
    +'<div class="form-half"><div class="form-row"><label class="form-label">고객사</label><input id="bmClient" value="'+esc(client.name||'')+'" readonly style="background:var(--bg)"/></div>'
    +'<div class="form-row"><label class="form-label">프로젝트명</label><input id="bmProject" value="'+esc(project.name||'')+'" readonly style="background:var(--bg)"/></div></div>'
    +'<div class="form-half"><div class="form-row"><label class="form-label">담당자</label><input id="bmOwner" value="'+esc(owner)+'"/></div><div class="form-row"><label class="form-label">발행 기준월</label><input id="bmMonth" value="'+esc(billingMonth)+'" placeholder="예) 2026년 04월"/></div></div>'
    +'<div class="form-half"><div class="form-row"><label class="form-label">공급가액</label><input id="bmAmount" type="number" value="'+esc(amount)+'" placeholder="예) 5000000"/></div><div class="form-row"><label class="form-label">세금계산서 담당자</label><input id="bmTax" value="'+esc(taxContact)+'" placeholder="예) 홍길동 / tax@company.com"/></div></div>'
    +'<div class="form-row"><label class="form-label">파일 경로</label><input id="bmPath" value="'+esc(filePath)+'" placeholder="예) Teams > 고객관리 > A사 > 2026 > Billing"/></div>'
    +'<div class="form-row"><label class="form-label">비고</label><input id="bmNote" value="'+esc(extraNote)+'" placeholder="예) 인보이스 번호, 특이사항"/></div>'
    +'<div class="form-row"><label class="form-label">메일 문안</label><textarea id="bmPreview" class="copy-area" readonly></textarea></div>'
    +'<div class="modal-footer"><div class="muted">프로젝트 저장값을 기본으로 불러오며, 임시 수정값은 현재 브라우저에도 저장됩니다.</div><div class="modal-footer-right"><button class="btn ghost" onclick="closeModal()">닫기</button><button class="btn" data-id="'+targetId+'" onclick="refreshBillingPreview(this.dataset.id)">새로고침</button><button class="btn primary" data-id="'+targetId+'" onclick="copyBillingMail(this.dataset.id)">문안 복사</button></div></div>'
    +'</div></div>';
  ['bmOwner','bmMonth','bmAmount','bmTax','bmPath','bmNote'].forEach(id=>{document.getElementById(id).addEventListener('input',()=>refreshBillingPreview(targetId));});
  refreshBillingPreview(targetId);
}
function refreshBillingPreview(pid){
  const project=projects.find(x=>x.id===pid); if(!project)return;
  const client=clients.find(c=>c.id===project.client_id)||{};
  const helper={
    billing_owner:document.getElementById('bmOwner')?.value.trim()||'',
    billing_month:document.getElementById('bmMonth')?.value.trim()||'',
    billing_amount:document.getElementById('bmAmount')?.value.trim()||'',
    tax_invoice_contact:document.getElementById('bmTax')?.value.trim()||'',
    file_path:document.getElementById('bmPath')?.value.trim()||'',
    extra_note:document.getElementById('bmNote')?.value.trim()||''
  };
  saveBillingDraft(pid,helper);
  const text=buildBillingEmail(project,client,helper);
  const area=document.getElementById('bmPreview'); if(area) area.value=text;
}
async function copyBillingMail(pid){refreshBillingPreview(pid);await copyText(document.getElementById('bmPreview').value);}

// ── Dashboard ──
function renderDash(){
  const today=new Date();
  const active=projects.filter(p=>p.status==='진행중');
  const overdue=projects.filter(p=>isOverdue(p));
  const unbilled=projects.filter(p=>p.status==='완료'&&p.is_billable&&p.billing_status==='미청구');
  const memberLoad=members.map(m=>({name:m.name,cnt:active.filter(p=>p.members.includes(m.name)).length})).sort((a,b)=>b.cnt-a.cnt);
  const maxL=Math.max(...memberLoad.map(m=>m.cnt),1);
  const bt={};projects.forEach(p=>{bt[p.type]=(bt[p.type]||0)+1;});const tot=projects.length||1;
  const el=document.getElementById('pageDash');
  el.innerHTML=
    '<div class="stat-grid">'
    +'<div class="stat-card"><div class="stat-label">고객사</div><div class="stat-num">'+clients.length+'</div><div class="stat-sub">전체 거래처</div></div>'
    +'<div class="stat-card"><div class="stat-label">진행중</div><div class="stat-num" style="color:var(--blue)">'+active.length+'</div><div class="stat-sub">현재 진행</div></div>'
    +'<div class="stat-card '+(overdue.length?'warn':'ok')+'"><div class="stat-label">기간 초과</div><div class="stat-num">'+overdue.length+'</div><div class="stat-sub">'+(overdue.length?'확인 필요':'이상 없음')+'</div></div>'
    +'<div class="stat-card '+(unbilled.length?'warn':'ok')+'"><div class="stat-label">빌링 미처리</div><div class="stat-num">'+unbilled.length+'</div><div class="stat-sub">'+(unbilled.length?'청구 필요':'이상 없음')+'</div></div>'
    +'</div>'
    +'<div class="dash-row">'
    +'<div class="card"><div class="section-label">인력별 업무량 (진행중) <span style="font-size:10px;font-weight:400;color:var(--text3)">3건 이상 = 과부하</span></div>'
    +memberLoad.map(m=>{const ol=m.cnt>=3;return '<div class="load-row"><div class="load-name" style="'+(ol?'color:var(--red)':'')+'">'+m.name+(ol?' ⚠':'')+'</div><div class="load-bar-wrap"><div class="load-bar'+(ol?' overload':'')+'" style="width:'+(m.cnt?Math.round(m.cnt/maxL*100):3)+'%"></div></div><div class="load-count'+(ol?' overload':'')+'">'+m.cnt+'</div></div>';}).join('')
    +'</div>'
    +'<div class="card"><div class="section-label">유형별 현황</div>'
    +Object.entries(bt).sort((a,b)=>b[1]-a[1]).map(([t,c])=>'<div class="load-row"><div class="load-name">'+t+'</div><div class="load-bar-wrap"><div class="load-bar" style="width:'+Math.round(c/tot*100)+'%;background:'+TYPES[t]+'"></div></div><div class="load-count">'+c+'</div></div>').join('')
    +'</div></div>'
    +(overdue.length?'<div class="card"><div class="section-label">기간 초과 목록</div>'+overdue.map(p=>'<div class="info-row"><span class="info-label" style="width:auto;flex:1">'+p.name+'</span><span class="info-value" style="color:var(--red);font-weight:700">'+p.end+' 초과</span></div>').join('')+'</div>':'')
    +(unbilled.length?'<div class="card" style="margin-top:14px"><div class="section-label">빌링 미처리 목록</div>'+unbilled.map(p=>'<div class="info-row"><span class="info-label" style="width:auto;flex:1">'+p.name+'</span>'+(p.billing_amount?'<span style="font-size:12px;color:var(--text2);font-weight:700">'+Number(p.billing_amount).toLocaleString()+'원</span>':'')+'<span class="badge badge-red" style="margin-left:8px">청구 필요</span></div>').join('')+'</div>':'');
}

// ── Notices ──
function formatDate(ts){const d=new Date(ts);return d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0');}

function renderNotices(){
  const el=document.getElementById('noticeList');
  if(!notices.length){el.innerHTML='<div class="notice-empty">공지사항이 없습니다.</div>';return;}
  el.innerHTML=notices.map(n=>'<div class="notice-card'+(n.is_pinned?' pinned':'')+'" onclick="openNoticeDetail(this.dataset.id)" data-id="'+n.id+'">'
    +'<div class="notice-chip-row">'+(n.is_pinned?'<span class="badge badge-blue">📌 고정</span>':'')+(n.require_confirm?'<span class="badge badge-red">필독</span>':'')+'</div>'
    +'<div class="notice-title">'+esc(n.title)+'</div>'
    +'<div class="notice-meta">'+formatDate(n.created_at)+'</div>'
    +'<div class="notice-preview">'+esc(n.content.substring(0,120))+'</div>'
    +'</div>').join('');
}

function openNoticeDetail(id){
  const n=notices.find(x=>x.id===id);if(!n)return;
  document.getElementById('modalArea').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal" style="width:540px">'
    +(n.require_confirm?'<div style="margin-bottom:12px"><span class="badge badge-red">📌 필독 공지</span></div>':'')
    +'<div class="notice-detail-title">'+esc(n.title)+'</div>'
    +'<div class="notice-detail-meta">'+formatDate(n.created_at)+'</div>'
    +'<div class="notice-detail-body">'+esc(n.content)+'</div>'
    +'<div class="modal-footer">'+(isAdmin?'<button class="btn danger" data-id="'+n.id+'" onclick="deleteNotice(this.dataset.id)">삭제</button>':'<div></div>')
    +'<div class="modal-footer-right">'+(isAdmin?'<button class="btn ghost" data-id="'+n.id+'" onclick="openNoticeEdit(this.dataset.id)">수정</button>':'')
    +'<button class="btn ghost" onclick="closeModal()">닫기</button></div></div>'
    +'</div></div>';
}

function openNoticeWrite(eid){
  const n=eid?notices.find(x=>x.id===eid):null;
  document.getElementById('modalArea').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal" style="width:540px"><div class="modal-title">'+(n?'공지 수정':'공지 작성')+'</div>'
    +'<div class="form-row"><label class="form-label">제목</label><input id="nTitle" value="'+(n?n.title:'')+'"/></div>'
    +'<div class="form-row"><label class="form-label">내용</label><textarea id="nContent" rows="7" style="resize:vertical">'+(n?n.content:'')+'</textarea></div>'
    +'<div style="display:flex;gap:20px;margin-bottom:4px">'
    +'<div class="checkbox-row"><input type="checkbox" id="nPin" '+(n&&n.is_pinned?'checked':'')+'/><label for="nPin">상단 고정</label></div>'
    +'<div class="checkbox-row"><input type="checkbox" id="nReq" '+(n&&n.require_confirm?'checked':'')+'/><label for="nReq">필독 (로그인 팝업)</label></div>'
    +'</div>'
    +'<div class="modal-footer"><div></div><div class="modal-footer-right"><button class="btn ghost" onclick="closeModal()">취소</button><button class="btn primary" data-id="'+(n?n.id:'')+'" onclick="saveNotice(this.dataset.id)">저장</button></div></div>'
    +'</div></div>';
  document.getElementById('nTitle').focus();
}
function openNoticeEdit(id){closeModal();openNoticeWrite(id);}
async function saveNotice(eid){
  const title=document.getElementById('nTitle').value.trim(),content=document.getElementById('nContent').value.trim();
  const is_pinned=document.getElementById('nPin').checked,require_confirm=document.getElementById('nReq').checked;
  if(!title||!content){alert('제목과 내용을 입력해주세요.');return;}
  try{
    if(eid){await api('PATCH','notices?id=eq.'+eid,{title,content,is_pinned,require_confirm,updated_at:new Date().toISOString()});}
    else{await api('POST','notices',{title,content,is_pinned,require_confirm,created_by:currentUser.id});}
    closeModal();await loadAll();if(curPage==='notice')renderNotices();else renderClients();
  }catch(e){alert('오류: '+e.message);}
}
async function deleteNotice(id){
  if(!confirm('삭제할까요?'))return;
  try{await api('DELETE','notices?id=eq.'+id);closeModal();await loadAll();if(curPage==='notice')renderNotices();else renderClients();}
  catch(e){alert('오류: '+e.message);}
}

// ── Members ──
function openMemberManager(){
  if(!isAdmin)return;
  const rows=members.map(m=>'<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)">'
    +'<div><div style="font-size:14px;font-weight:700;color:var(--navy)">'+m.name+'</div><div style="font-size:12px;color:var(--text3);margin-top:2px">'+(m.email||'이메일 미설정')+'</div></div>'
    +'<button class="btn danger sm" data-id="'+m.id+'" data-name="'+m.name+'" onclick="deleteMember(this.dataset.id,this.dataset.name)">삭제</button>'
    +'</div>').join('');
  document.getElementById('modalArea').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal"><div class="modal-title">인력 관리</div>'
    +'<div style="max-height:280px;overflow-y:auto;margin-bottom:20px">'+(rows||'<div style="color:var(--text3);padding:20px 0;text-align:center">등록된 인력이 없습니다</div>')+'</div>'
    +'<div class="divider">새 인력 추가</div>'
    +'<div class="form-half"><div class="form-row"><label class="form-label">이름</label><input id="nMN" placeholder="이름"/></div>'
    +'<div class="form-row"><label class="form-label">이메일</label><input id="nME" placeholder="hong@bexleyintl.com"/></div></div>'
    +'<div id="mms" style="font-size:12px;min-height:18px;margin-top:4px"></div>'
    +'<div class="modal-footer" style="justify-content:space-between">'
    +'<div></div><div class="modal-footer-right"><button class="btn ghost" onclick="closeModal()">닫기</button><button class="btn primary" onclick="addNewMember()">추가</button></div></div>'
    +'</div></div>';
  document.getElementById('nMN').focus();
}
async function addNewMember(){
  const name=document.getElementById('nMN')?.value.trim(),email=document.getElementById('nME')?.value.trim()||null;
  if(!name)return;
  if(members.find(m=>m.name===name)){const s=document.getElementById('mms');s.textContent='이미 등록된 이름입니다.';s.style.color='var(--red)';return;}
  try{await api('POST','members',{name,email});await loadAll();openMemberManager();}
  catch(e){const s=document.getElementById('mms');s.textContent='오류: '+e.message;s.style.color='var(--red)';}
}
async function deleteMember(id,name){
  if(projects.some(p=>p.members.includes(name))){alert('"'+name+'"은 프로젝트에 배정되어 있어 삭제할 수 없습니다.');return;}
  if(!confirm('"'+name+'"을 삭제할까요?'))return;
  try{await api('DELETE','members?id=eq.'+id);await loadAll();openMemberManager();}catch(e){alert('오류: '+e.message);}
}

function closeModal(){document.getElementById('modalArea').innerHTML='';}

// ── Init ──
document.getElementById('prevM').onclick=()=>{if(curMonth===1){curMonth=12;curYear--;}else curMonth--;renderGantt();};
document.getElementById('nextM').onclick=()=>{if(curMonth===12){curMonth=1;curYear++;}else curMonth++;renderGantt();};
document.getElementById('memberFilter').onchange=renderGantt;
document.getElementById('gvp').style.cssText='background:var(--navy);color:#fff;border-color:var(--navy)';

(async()=>{const ok=await restoreSession();if(ok)await initApp();else showPage('login');})();
</script>
